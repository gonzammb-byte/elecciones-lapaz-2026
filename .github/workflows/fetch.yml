name: Actualizar resultados OEP

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr fetch.py
        run: python elecciones-lapaz-2026/fetch.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados/
          git diff --staged --quiet || git commit -m "datos: actualización $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
